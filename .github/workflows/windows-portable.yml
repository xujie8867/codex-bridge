name: Windows Portable Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Package Windows portable app
        env:
          CODEXBRIDGE_RELEASE_VERSION: ${{ github.ref_name }}
        run: npm run package:win

      - name: Smoke test packaged app
        run: npm run package:win:smoke

      - name: Create release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist-artifacts" | Out-Null
          $archive = "dist-artifacts/CodexBridge-Windows-x64-Portable.zip"
          Compress-Archive -Path "release/*" -DestinationPath $archive -Force

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: CodexBridge-Windows-x64-Portable
          path: dist-artifacts/CodexBridge-Windows-x64-Portable.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          generate_release_notes: true
          body: |
            Windows portable download:
            https://github.com/${{ github.repository }}/releases/latest/download/CodexBridge-Windows-x64-Portable.zip
          files: dist-artifacts/CodexBridge-Windows-x64-Portable.zip
